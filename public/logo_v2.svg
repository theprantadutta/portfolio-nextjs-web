<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="600" height="600">
  <defs>
    <!-- Gradient for the main logo - cyan to green -->
    <linearGradient id="mainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06B6D4;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0EA5A0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#10B981;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10B981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#34D399;stop-opacity:1" />
    </linearGradient>

    <!-- Shadow filter -->
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#06B6D4" flood-opacity="0.25"/>
    </filter>

    <!-- Glow filter -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <clipPath id="circleClip">
      <circle cx="300" cy="300" r="240"/>
    </clipPath>
  </defs>

  <!-- Background circle - clean, no outer borders -->
  <circle cx="300" cy="300" r="240" fill="#111827" filter="url(#shadow)"/>
  
  <!-- Subtle grid pattern -->
  <g clip-path="url(#circleClip)" opacity="0.04">
    <line x1="60" y1="120" x2="540" y2="120" stroke="white" stroke-width="0.5"/>
    <line x1="60" y1="180" x2="540" y2="180" stroke="white" stroke-width="0.5"/>
    <line x1="60" y1="240" x2="540" y2="240" stroke="white" stroke-width="0.5"/>
    <line x1="60" y1="300" x2="540" y2="300" stroke="white" stroke-width="0.5"/>
    <line x1="60" y1="360" x2="540" y2="360" stroke="white" stroke-width="0.5"/>
    <line x1="60" y1="420" x2="540" y2="420" stroke="white" stroke-width="0.5"/>
    <line x1="60" y1="480" x2="540" y2="480" stroke="white" stroke-width="0.5"/>
    <line x1="120" y1="60" x2="120" y2="540" stroke="white" stroke-width="0.5"/>
    <line x1="180" y1="60" x2="180" y2="540" stroke="white" stroke-width="0.5"/>
    <line x1="240" y1="60" x2="240" y2="540" stroke="white" stroke-width="0.5"/>
    <line x1="300" y1="60" x2="300" y2="540" stroke="white" stroke-width="0.5"/>
    <line x1="360" y1="60" x2="360" y2="540" stroke="white" stroke-width="0.5"/>
    <line x1="420" y1="60" x2="420" y2="540" stroke="white" stroke-width="0.5"/>
    <line x1="480" y1="60" x2="480" y2="540" stroke="white" stroke-width="0.5"/>
  </g>

  <!-- The "P" letter -->
  <rect x="155" y="170" width="42" height="260" rx="6" fill="url(#mainGrad)" filter="url(#glow)"/>
  <path d="M176 170 L176 170 Q176 170 176 170 L280 170 Q345 170 345 235 Q345 300 280 300 L176 300" 
        fill="none" stroke="url(#mainGrad)" stroke-width="42" stroke-linecap="round" stroke-linejoin="round"
        filter="url(#glow)"/>

  <!-- The "D" letter -->
  <rect x="280" y="170" width="42" height="260" rx="6" fill="url(#accentGrad)" filter="url(#glow)"/>
  <path d="M301 170 L360 170 Q445 170 445 300 Q445 430 360 430 L301 430" 
        fill="none" stroke="url(#accentGrad)" stroke-width="42" stroke-linecap="round" stroke-linejoin="round"
        filter="url(#glow)"/>

  <!-- Connecting bridge between P and D -->
  <rect x="197" y="279" width="104" height="42" rx="6" fill="url(#mainGrad)" opacity="0.6"/>
  
  <!-- Accent dot -->
  <circle cx="260" cy="210" r="6" fill="#34D399" opacity="0.8"/>
  <circle cx="260" cy="210" r="12" fill="none" stroke="#34D399" stroke-width="1" opacity="0.3"/>

  <!-- Bottom accent line -->
  <line x1="180" y1="460" x2="420" y2="460" stroke="url(#accentGrad)" stroke-width="2" opacity="0.4" stroke-linecap="round"/>
  
  <!-- Name text -->
  <text x="300" y="500" text-anchor="middle" fill="#94A3B8" font-family="'SF Pro Display', 'Segoe UI', system-ui, sans-serif" font-size="16" font-weight="300" letter-spacing="8">PRANTA DUTTA</text>
</svg>
